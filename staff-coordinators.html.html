<!DOCTYPE html>

    <style>

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }

        .sub-header h1 { color: var(--accent-gold); text-transform: uppercase; font-size: 1.8rem; }
        .sub-header a { color: var(--pure-white); text-decoration: none; font-weight: bold; font-size: 0.9rem; margin-top: 8px; display: inline-block; }
        .container { max-width: 900px; margin: 40px auto; padding: 0 20px; }
        .section-card { background: var(--pure-white); padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05); border-left: 5px solid var(--primary-green); }
        h3 { color: var(--primary-green); margin-bottom: 20px; font-size: 1.8rem; border-bottom: 2px solid var(--off-white); padding-bottom: 10px; }
        footer { background-color: var(--deep-brown); color: var(--pure-white); text-align: center; padding: 20px; margin-top: 40px; border-top: 5px solid var(--primary-green); }

</head>
